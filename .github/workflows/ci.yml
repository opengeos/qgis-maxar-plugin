name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: [main]

jobs:
    pre-commit:
        name: pre-commit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
            - uses: pre-commit/action@v3.0.1

    bandit:
        name: Bandit security scan
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: "3.13"
            - name: Install Bandit
              run: pip install bandit
            - name: Run Bandit (matches plugins.qgis.org security scan)
              run: bandit -r maxar_open_data

    qt-smoke:
        name: PyQt${{ matrix.qt-major }} import smoke (Python ${{ matrix.python-version }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                qt-major: ["5", "6"]
                python-version: ["3.10", "3.11", "3.12", "3.13"]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}
            - name: Install Qt runtime libs
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1
            - name: Install PyQt${{ matrix.qt-major }} and pytest
              run: |
                  python -m pip install --upgrade pip
                  pip install PyQt${{ matrix.qt-major }} pytest
            - name: Run import smoke tests
              run: pytest tests -v
